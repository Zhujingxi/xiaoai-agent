# The lightweight Web UI listens on 0.0.0.0:8080 by default.
# Override it with --web-bind / --web-port; Web settings are CLI-only and
# saved agent.yaml changes take effect only after restarting xiaoai-agent.
runtime:
  kws_vpm_lib: /usr/lib/libvpm.so
  kws_vpm_config_dir: /usr/share/mipns/vpm/json_segment
  kws_pcm: noop
  kws_sample_rate: 48000
  kws_channels: 4
  kws_bits_per_sample: 32
  kws_frame_ms: 8
  kws_period_size: 384
  kws_buffer_size: 4096
  kws_ref_channel_index: 3
  kws_start_status: 6
  acknowledge_text: ["在", "我在", "哎"]
  session_idle_timeout_s: 20

device:
  tts_command: "/usr/sbin/tts_play.sh {text}"
  play_url_command: "killall miplayer 2>/dev/null; miplayer -f {url} >/tmp/xiaoai-miplayer.log 2>&1 &"
  stop_audio_command: "killall tts_play.sh miplayer 2>/dev/null; mphelper pause"
  pause_audio_command: "mphelper pause 2>/dev/null || true; for p in $(pidof miplayer 2>/dev/null); do kill -STOP \"$p\" 2>/dev/null || true; done"
  resume_audio_command: "for p in $(pidof miplayer 2>/dev/null); do kill -CONT \"$p\" 2>/dev/null || true; done; mphelper play 2>/dev/null || true"
  duck_audio_command: "amixer sget mysoftvol | awk -F'[][]' '/%/ {print $2; exit}' | tr -d '%' >/tmp/xiaoai-mysoftvol.before; amixer sset mysoftvol 25% >/dev/null 2>&1 || true"
  unduck_audio_command: "v=$(cat /tmp/xiaoai-mysoftvol.before 2>/dev/null); if [ -n \"$v\" ]; then amixer sset mysoftvol \"${v}%\" >/dev/null 2>&1 || true; fi; rm -f /tmp/xiaoai-mysoftvol.before"
  abort_command: "killall tts_play.sh miplayer 2>/dev/null; mphelper pause 2>/dev/null || true; ubus call mediaplayer media_control '{\"player\":\"mediaplayer\",\"action\":\"pause\",\"volume\":0}' 2>/dev/null || true; ubus call mediaplayer player_play_operation '{\"media\":\"app_ios\",\"action\":\"stop\"}' 2>/dev/null || true"
  # Short progress tone played while a slow remote brain (voice.runtime: hermes)
  # is still working. The agent writes the WAV to /tmp at startup.
  thinking_sound_command: "aplay -q /tmp/xiaoai-thinking.wav"
  led_enabled: true
  led_listening: 3
  led_user_speaking: 4
  led_thinking: 2
  led_speaking: 5

capture:
  pcm: vpm_asr
  sample_rate: 16000
  channels: 1
  bits_per_sample: 16
  period_size: 360
  buffer_size: 1440
  threshold: 0.006
  mic_gain: 1.0
  block_ms: 100
  pre_roll_ms: 300
  silence_ms: 1500
  min_speech_ms: 300
  max_utterance_s: 15.0
  cooldown_s: 0.7

voice:
  # legacy keeps the ASR -> text Agent -> device TTS pipeline below.
  # native_qwen sends VPM-processed microphone audio to Qwen Realtime over WebRTC
  # and lets it call the same built-in and MCP tools registered with the text Agent.
  # hermes keeps the ASR -> device TTS pipeline but replaces the text Agent with a
  # remote Hermes Agent (Nous Research) API server configured via llm.*; the remote
  # agent is the sole brain, so no local tool definitions are sent and continuous
  # sessions end via runtime.session_idle_timeout_s instead of end_conversation.
  runtime: legacy
  qwen:
    # Beijing endpoint. Replace {WorkspaceId}; for Singapore use
    # https://{WorkspaceId}.ap-southeast-1.maas.aliyuncs.com/api/v1/webrtc/realtime
    url: https://{WorkspaceId}.cn-beijing.maas.aliyuncs.com/api/v1/webrtc/realtime
    api_key: EMPTY
    model: qwen3.5-omni-plus-realtime
    voice: Tina
    input_audio_format: pcm
    output_audio_format: pcm
    input_sample_rate: 16000
    # WebRTC negotiates Opus at a 48 kHz RTP clock. Playback is decoded to 48 kHz PCM.
    output_sample_rate: 48000
    # Qwen3.5 Omni recommends semantic VAD. Lower silence reduces turn-end latency;
    # 500 ms is the low-latency default, while 800 ms is Qwen's conservative default.
    turn_detection_threshold: 0.5
    turn_detection_silence_duration_ms: 500
    connect_timeout_s: 10
    event_timeout_s: 30
    # Native tool calls are cancellable, individually timed out, and bounded per turn.
    tool_timeout_s: 10
    max_tool_calls: 8
    max_tool_iterations: 4

asr:
  # open_ai, openai_realtime, or xiaomi_aivs
  provider: xiaomi_aivs

  # OpenAI-compatible ASR settings. Used when provider is open_ai.
  open_ai:
    base_url: https://api.openai.com/v1
    api_key: EMPTY
    model: whisper-1
    language: zh
    prompt: ""
    timeout_s: 5
    retries: 1

  # OpenAI Realtime transcription WebSocket settings. Used when provider is openai_realtime.
  openai_realtime:
    base_url: https://api.openai.com/v1
    api_key: EMPTY
    model: gpt-realtime-whisper
    target_sample_rate: 24000
    chunk_ms: 200
    timeout_s: 10
    retries: 1

  # Xiaomi native AIVS ASR. Used when provider is xiaomi_aivs.
  xiaomi_aivs:
    sdk_lib: /usr/lib/libaivs_sdk.so
    token_path: /data/TOKEN
    miio_dir: /data/miio
    engine_mode: 2
    connect_wait_ms: 1500
    # Chunk size only. Buffered audio is always sent as fast as possible.
    chunk_ms: 100
    wait_after_finish_ms: 15000
    # Keep true for ASR-only behavior. This sends Execution.RequestControl
    # as a singular "context" on SpeechRecognizer.Recognize and disables
    # Xiaomi cloud NLP/TTS/device-control side effects.
    asr_only: true
    # Debug only. Setting this true allows normal cloud execution side effects.
    allow_cloud_execution: false

llm:
  base_url: https://api.openai.com/v1
  api_key: EMPTY
  model: gpt-5.4-mini
  timeout_s: 10
  max_tokens: 300
  retries: 1
  temperature: 0.5
  # With voice.runtime: hermes, point these at a Hermes Agent (Nous Research)
  # API server on the LAN: enable it with API_SERVER_ENABLED=true,
  # API_SERVER_KEY=<secret>, API_SERVER_HOST=0.0.0.0 (it binds localhost by
  # default) and keep `hermes gateway` running, then use:
  # base_url: http://<macmini-ip>:8642/v1
  # api_key: <API_SERVER_KEY>
  # model: hermes-agent
  # timeout_s: 60  # agent runs with tool use are slower than plain LLM calls
  # retries: 0     # retrying an agent run can duplicate real-world side effects

agent:
  timezone: Asia/Shanghai
  # Site-specific rules appended to the built-in speaker instructions (also
  # editable in the web UI). Keep short; the text ships with every session.
  custom_instructions: ""
  # Progress tone while a hermes-mode reply is still being generated, so long
  # tool loops do not leave dead air. Only used when voice.runtime is hermes.
  thinking_sound:
    enabled: true
    delay_s: 5.0
    interval_s: 6.0
  weather:
    qweather_url: ""
    default_location: ""
    ip_lookup_url: https://ipapi.co/json/
    timeout_s: 5
  web_search:
    enabled: false
    tavily_url: https://api.tavily.com/search
    api_key: ""
    timeout_s: 10
    max_results: 3
    search_depth: basic

mcp:
  home_assistant:
    enabled: false
    url: http://homeassistant.local:8123/mcp_server/sse
    token: ""
    # Also bounds native-Qwen MCP tool discovery and list refresh.
    timeout_s: 5

music:
  enabled: false
  provider: navidrome
  interruption:
    # pause, duck, or none. duck uses device.duck_audio_command / unduck_audio_command.
    mode: pause
  netease:
    # External Netease API service URL. The speaker does not start this service locally.
    api_base_url: http://127.0.0.1:3300
    login_mode: captcha
    account: ""
    phone: ""
    password: ""
    md5_password: ""
    # Optional read-only seed cookie. Login refreshes are kept in memory and are not written back.
    cookie_file: null
    default_level: standard
    timeout_s: 5
    login_on_start: true
  navidrome:
    base_url: http://127.0.0.1:4533
    username: ""
    password: ""
    api_version: 1.16.1
    timeout_s: 5

airplay:
  enabled: false
  name: XiaoAI AirPlay
  port: 5000
  password: ""
  # Optional stable 6-byte identity, for example c2:46:38:ad:3e:25.
  hwaddr: ""
  output:
    backend: aplay
    aplay_path: /usr/bin/aplay
    device: default
    format: S16_LE
  interruption:
    # none or duck. duck lowers only AirPlay PCM gain while the voice agent is active.
    mode: duck
    duck_gain: 0.25
